<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ariel's Med">
  <!-- Background solid color -->
  <rect width="512" height="512" rx="116" fill="#FCF6F0"/>
  
  <!-- Minimalist organic twig line art -->
  <g transform="translate(256, 266)">
    <!-- Stem -->
    <path d="M -10 130 C 0 60 20 -20 60 -100" fill="none" stroke="#52433D" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Leaf 1 (Top) -->
    <path d="M 60 -100 C 80 -100 95 -125 80 -145 C 60 -145 45 -120 60 -100 Z" fill="#A4C7B6" stroke="#52433D" stroke-width="9" stroke-linejoin="round"/>
    
    <!-- Leaf 2 (Upper Left) -->
    <path d="M 32 -30 C 5 -35 -15 -10 -5 10 C 20 10 30 -10 32 -30 Z" fill="#A4C7B6" stroke="#52433D" stroke-width="9" stroke-linejoin="round"/>
    
    <!-- Leaf 3 (Upper Right) -->
    <path d="M 46 -65 C 75 -60 85 -85 75 -105 C 50 -105 40 -80 46 -65 Z" fill="#A4C7B6" stroke="#52433D" stroke-width="9" stroke-linejoin="round"/>

    <!-- Leaf 4 (Lower Left) -->
    <path d="M 12 35 C -15 30 -35 55 -25 75 C 0 75 10 50 12 35 Z" fill="#A4C7B6" stroke="#52433D" stroke-width="9" stroke-linejoin="round"/>
    
    <!-- Leaf 5 (Lower Right) -->
    <path d="M 23 5 C 50 10 60 -15 50 -35 C 25 -35 15 -10 23 5 Z" fill="#A4C7B6" stroke="#52433D" stroke-width="9" stroke-linejoin="round"/>
  </g>
</svg>
