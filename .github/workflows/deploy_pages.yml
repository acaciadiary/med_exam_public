name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy_pages.yml"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install parser dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run parser tests
        run: pytest tests/parser

      - name: Validate bundled datasets
        run: python scripts/exams/validate_dataset.py "public/data/exams/**/*.json" --out reports/dataset-quality.json --baseline scripts/exams/fixtures/dataset_quality_baseline.json

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
