name: Update Exam Data

on:
  schedule:
    - cron: "0 2 16 2,10 *"
  workflow_dispatch:
    inputs:
      moex_year:
        description: "考選部民國年，例如 115"
        required: true
        default: "115"
      preset:
        description: "scripts/exams/moex_sources.py 裡的 preset 名稱"
        required: true
        default: "physician-115-first"
      commit_changes:
        description: "有新題庫資料時自動提交到 main"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: update-exams-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-exams:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MOEX_YEAR: ${{ inputs.moex_year || '115' }}
      MOEX_PRESET: ${{ inputs.preset || 'physician-115-first' }}
      COMMIT_CHANGES: ${{ github.event_name == 'schedule' || inputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install parser dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run parser tests
        run: pytest tests/parser

      - name: Download MOEX PDFs
        run: python scripts/exams/download_moex.py --year "$MOEX_YEAR" --preset "$MOEX_PRESET" --out-dir downloads/moex

      - name: Build frontend datasets
        run: |
          python scripts/exams/build_moex_preset.py \
            --preset "$MOEX_PRESET" \
            --downloads-dir downloads/moex \
            --data-dir public/data \
            --write-manifest

      - name: Validate generated datasets
        run: python scripts/exams/validate_dataset.py "public/data/exams/**/*.json" --out reports/dataset-quality.json

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Commit updated data
        if: env.COMMIT_CHANGES == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data scripts/exams/repair_dictionary.json
          if git diff --cached --quiet; then
            echo "No exam data changes."
          else
            git commit -m "chore: update MOEX exam data ($MOEX_PRESET)"
            git push
          fi

      - name: Report local-only changes
        if: env.COMMIT_CHANGES != 'true'
        run: git status --short
